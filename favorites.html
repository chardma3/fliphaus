<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Favorites — FlipHaus</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: "Poppins", sans-serif;
        background: #121212;
        color: #e0e0e0;
        min-height: 100vh;
      }

      #app { display: flex; flex-direction: column; align-items: center; padding: 24px 16px; }

      header {
        width: 100%; max-width: 700px;
        display: flex; align-items: flex-start; justify-content: space-between;
        margin-bottom: 20px;
      }
      header h1 { font-size: 1.8rem; color: #fff; }
      header h2 { font-size: 0.85rem; font-weight: 300; color: #666; margin-top: 2px; }

      .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
      .header-right img { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; }
      .header-right span { font-size: 0.85rem; color: #aaa; }
      .signout-link { font-size: 0.8rem; color: #555; text-decoration: none; }
      .signout-link:hover { color: #888; }

      .nav-bar {
        width: 100%; max-width: 700px;
        display: flex; gap: 10px; margin-bottom: 16px;
      }
      .nav-link {
        padding: 6px 14px; border-radius: 20px;
        font-family: "Poppins", sans-serif; font-size: 0.82rem;
        text-decoration: none; color: #888;
        border: 1px solid #333; background: #1e1e1e;
        transition: all 0.2s;
      }
      .nav-link:hover { border-color: #555; color: #ccc; }
      .nav-link.active { background: #1a3a1a; border-color: #69db7c; color: #69db7c; }

      .login-msg {
        width: 100%; max-width: 700px;
        text-align: center; padding: 60px 20px;
        color: #666; font-size: 0.95rem;
      }
      .login-msg a { color: #7eb8f7; text-decoration: none; }
      .login-msg a:hover { text-decoration: underline; }

      #stats {
        width: 100%; max-width: 700px;
        background: #1e1e1e; border-radius: 8px;
        padding: 10px 15px; margin-bottom: 12px;
        font-size: 0.85rem; color: #666;
      }

      #feed { width: 100%; display: flex; flex-direction: column; align-items: center; }

      .listing {
        background: #1a2e1f; border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        width: 100%; max-width: 700px;
        margin-bottom: 12px; overflow: hidden;
        position: relative;
      }

      .carousel {
        position: relative; width: 100%; height: 220px;
        background: #2a2a2a; overflow: hidden;
      }
      .carousel-track {
        display: flex; height: 100%;
        transition: transform 0.3s ease;
      }
      .carousel-slide {
        min-width: 100%; height: 100%;
        object-fit: cover; display: block;
      }
      .carousel-btn {
        position: absolute; top: 50%; transform: translateY(-50%);
        background: rgba(0,0,0,0.55); border: none; color: #fff;
        font-size: 1.2rem; padding: 8px 13px; cursor: pointer;
        border-radius: 6px; backdrop-filter: blur(3px); z-index: 2;
      }
      .carousel-btn:hover { background: rgba(0,0,0,0.8); }
      .carousel-prev { left: 8px; }
      .carousel-next { right: 8px; }
      .carousel-counter {
        position: absolute; bottom: 8px; right: 10px;
        background: rgba(0,0,0,0.55); color: #ddd;
        font-size: 0.75rem; padding: 2px 8px; border-radius: 12px;
        backdrop-filter: blur(3px); z-index: 2;
      }
      .carousel-no-img {
        width: 100%; height: 220px; background: #2a2a2a;
        display: flex; align-items: center; justify-content: center;
        color: #555; font-size: 0.85rem;
      }

      .listing-body { padding: 14px 16px; }
      .listing-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
      .listing-header h3 { font-size: 1rem; color: #fff; margin: 0; }
      .listing-body .location { font-size: 0.82rem; color: #888; margin-bottom: 10px; }

      .listing-meta {
        display: flex; flex-wrap: wrap; gap: 10px;
        font-size: 0.85rem; color: #ccc; margin-bottom: 10px;
      }
      .listing-meta span { background: #2a2a2a; padding: 3px 10px; border-radius: 20px; }
      .price-tag { background: #1a3a1a !important; color: #69db7c !important; font-weight: 600; }

      .listing-agency { font-size: 0.78rem; color: #666; margin-bottom: 8px; }
      .listing-showing { font-size: 0.78rem; color: #ffa94d; margin-bottom: 8px; }

      .listing-actions { display: flex; gap: 10px; margin-top: 10px; }
      .action-btn {
        flex: 1; padding: 8px; border: none; border-radius: 6px;
        font-family: "Poppins", sans-serif; font-size: 0.82rem;
        cursor: pointer; transition: opacity 0.2s; text-align: center;
      }
      .action-btn:hover { opacity: 0.85; }
      .remove-btn { background: #3a1a1a; color: #ff8888; }
      .view-btn { background: #1a2a3a; color: #7eb8f7; text-decoration: none; }

      .reno-badge {
        position: absolute; top: 10px; left: 10px; z-index: 3;
        padding: 4px 10px; border-radius: 6px;
        font-size: 0.75rem; font-weight: 600;
        backdrop-filter: blur(6px);
      }
      .reno-badge.high   { background: rgba(26,90,26,0.9); color: #69db7c; }
      .reno-badge.medium { background: rgba(90,70,10,0.9); color: #ffd43b; }
      .reno-badge.low    { background: rgba(60,60,60,0.85); color: #aaa; }

      .reno-summary {
        font-size: 0.78rem; color: #aaa; margin-bottom: 8px;
        padding: 6px 10px; background: #252525; border-radius: 6px;
        border-left: 3px solid #444;
      }
      .reno-summary.high   { border-left-color: #69db7c; }
      .reno-summary.medium { border-left-color: #ffd43b; }
      .reno-summary.low    { border-left-color: #555; }
      .reno-cost { font-weight: 600; color: #ccc; }

      .floor-plan-link { font-size: 0.78rem; color: #888; margin-bottom: 8px; }
      .floor-plan-link a { color: #7eb8f7; text-decoration: none; }
      .floor-plan-link a:hover { text-decoration: underline; }

      .new-badge {
        position: absolute; top: 10px; right: 10px; z-index: 3;
        padding: 4px 10px; border-radius: 6px;
        font-size: 0.75rem; font-weight: 600;
        background: rgba(59,130,246,0.9); color: #fff;
        backdrop-filter: blur(6px);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <div>
          <h1>FlipHaus</h1>
          <h2>Your saved properties</h2>
        </div>
        <div class="header-right" id="header-right"></div>
      </header>

      <div class="nav-bar">
        <a href="/" class="nav-link">All listings</a>
        <a href="/favorites" class="nav-link active">Favorites</a>
        <a href="/areas" class="nav-link">Areas</a>
        <a href="/methodology" class="nav-link">How it works</a>
        <a href="/account" class="nav-link">Account</a>
        <a href="/market" class="nav-link">Market</a>
        <a href="/builders" class="nav-link">Builders</a>
      </div>

      <div id="stats"></div>
      <div id="feed"></div>
    </div>

    <script>
      let currentUser = null;

      function renoClass(score) {
        if (score >= 7) return "high";
        if (score >= 4) return "medium";
        return "low";
      }

      function renoLabel(score) {
        if (score >= 7) return "High potential";
        if (score >= 4) return "Some potential";
        return "Move-in ready";
      }

      function formatSEK(n) {
        if (!n) return null;
        return n.toLocaleString("sv-SE") + " kr";
      }

      function translateRooms(str) {
        if (!str) return null;
        return str.replace("rum", "rooms");
      }

      function translateFloor(str) {
        if (!str) return null;
        return str.replace(/^vån\s*/i, "Floor ");
      }

      function translateFee(str) {
        if (!str) return null;
        return str.replace("kr/mån", "kr/mo");
      }

      function isApartmentType(str) {
        if (!str) return false;
        return /lägenhet|bostadsrätt/i.test(str);
      }

      async function removeFromFavorites(listingId, cardEl) {
        await fetch("/api/preference", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ listingId, status: null }),
        });
        cardEl.style.transition = "opacity 0.3s, transform 0.3s";
        cardEl.style.opacity = "0";
        cardEl.style.transform = "scale(0.95)";
        setTimeout(() => {
          cardEl.remove();
          const remaining = document.querySelectorAll(".listing").length;
          document.getElementById("stats").innerHTML = remaining
            ? `<strong>${remaining}</strong> saved ${remaining === 1 ? "property" : "properties"}`
            : "No saved properties yet. Go to <a href='/' style='color:#7eb8f7'>All listings</a> and tap the green heart to save.";
        }, 300);
      }

      function renderListings(data) {
        const statsEl = document.getElementById("stats");
        const feedEl = document.getElementById("feed");
        feedEl.innerHTML = "";

        if (!data.listings?.length) {
          statsEl.innerHTML = "No saved properties yet. Go to <a href='/' style='color:#7eb8f7'>All listings</a> and tap the green heart to save.";
          return;
        }

        statsEl.innerHTML = `<strong>${data.total}</strong> saved ${data.total === 1 ? "property" : "properties"}`;

        data.listings.forEach((listing) => {
          const div = document.createElement("div");
          div.className = "listing";
          div.dataset.id = listing.id;

          const imgs = listing.images && listing.images.length ? listing.images : (listing.thumbnail ? [listing.thumbnail] : []);

          const carouselHtml = imgs.length
            ? `<div class="carousel" data-idx="0">
                <div class="carousel-track" style="transform:translateX(0)">
                  ${imgs.map(url => `<img class="carousel-slide" src="${url}" loading="lazy" />`).join("")}
                </div>
                ${imgs.length > 1 ? `<button class="carousel-btn carousel-prev">&#8249;</button><button class="carousel-btn carousel-next">&#8250;</button><div class="carousel-counter">1 / ${imgs.length}</div>` : ""}
              </div>`
            : `<div class="carousel-no-img">No image</div>`;

          const renoCls = listing.renovationScore != null ? renoClass(listing.renovationScore) : null;
          const renoBadgeHtml = listing.renovationScore != null
            ? `<div class="reno-badge ${renoCls}">${listing.renovationScore}/10 — ${renoLabel(listing.renovationScore)}</div>`
            : "";
          const renoSummaryHtml = listing.renovationSummary
            ? `<div class="reno-summary ${renoCls}">
                ${listing.renovationSummary}
                ${listing.totalEstimatedCostSEK ? `<br/><span class="reno-cost">Est. renovation: ${formatSEK(listing.totalEstimatedCostSEK)}</span>` : ""}
              </div>`
            : "";

          const isNew = listing.publishedAt && (Date.now() - new Date(listing.publishedAt).getTime()) < 3 * 24 * 60 * 60 * 1000;
          const newBadgeHtml = isNew ? `<div class="new-badge">NEW</div>` : "";

          const floorPlanHtml = listing.hasFloorPlan === true
            ? `<div class="floor-plan-link">Floor plan: <a href="${listing.link}" target="_blank">View on Hemnet</a></div>`
            : `<div class="floor-plan-link">Floor plan: None provided</div>`;

          div.innerHTML = `
            <div style="position:relative">
              ${carouselHtml}
              ${renoBadgeHtml}
              ${newBadgeHtml}
            </div>
            <div class="listing-body">
              <div class="listing-header">
                <h3>${listing.streetAddress}</h3>
              </div>
              <div class="location">${listing.locationDescription}</div>
              <div class="listing-meta">
                <span class="price-tag">${listing.askingPrice}</span>
                ${listing.rooms ? `<span>${translateRooms(listing.rooms)}</span>` : ""}
                ${listing.size ? `<span>${listing.size}</span>` : ""}
                ${listing.housingForm && !isApartmentType(listing.housingForm) ? `<span>${listing.housingForm}</span>` : ""}
                ${listing.fee ? `<span>Fee ${translateFee(listing.fee)}</span>` : ""}
                ${listing.floor ? `<span>${translateFloor(listing.floor)}</span>` : ""}
                ${listing.squareMeterPrice ? `<span>${listing.squareMeterPrice}</span>` : ""}
              </div>
              ${listing.brokerAgencyName ? `<div class="listing-agency">${listing.brokerAgencyName}</div>` : ""}
              ${listing.nextShowing ? `<div class="listing-showing">${listing.nextShowing}</div>` : ""}
              ${renoSummaryHtml}
              ${floorPlanHtml}
              <div class="listing-actions">
                <button class="action-btn remove-btn">Remove</button>
                <a href="${listing.link}" target="_blank" class="action-btn view-btn">View on Hemnet</a>
              </div>
            </div>
          `;

          div.querySelector(".remove-btn").addEventListener("click", () => removeFromFavorites(listing.id, div));

          const carousel = div.querySelector(".carousel");
          if (carousel && imgs.length > 1) {
            const track = carousel.querySelector(".carousel-track");
            const counter = carousel.querySelector(".carousel-counter");
            let idx = 0;
            function goTo(n) {
              idx = (n + imgs.length) % imgs.length;
              track.style.transform = `translateX(-${idx * 100}%)`;
              counter.textContent = `${idx + 1} / ${imgs.length}`;
            }
            carousel.querySelector(".carousel-prev").addEventListener("click", () => goTo(idx - 1));
            carousel.querySelector(".carousel-next").addEventListener("click", () => goTo(idx + 1));
          }

          feedEl.appendChild(div);
        });
      }

      async function init() {
        const res = await fetch("/api/me");
        const data = await res.json();
        currentUser = data.user;

        const headerRight = document.getElementById("header-right");
        if (currentUser) {
          headerRight.innerHTML = `
            <img src="${currentUser.avatar}" alt="" />
            <span>${currentUser.name.split(" ")[0]}</span>
            <a href="/auth/logout" class="signout-link">Sign out</a>
          `;
          document.getElementById("stats").textContent = "Loading...";
          const favRes = await fetch("/api/favorites");
          const favData = await favRes.json();
          renderListings(favData);
        } else {
          document.getElementById("stats").innerHTML =
            "<div class='login-msg'><a href='/auth/google'>Sign in with Google</a> to see your saved properties.</div>";
        }
      }

      init();
    </script>
  </body>
</html>
