# Staggered active scrape — batch 1 of 3 (see api/hemnet-refresh-safety.js
# getAreaBatch). Each batch scrapes ~6 areas so a single /api/scrape request
# stays well under Hemnet's ~100s Cloudflare edge timeout, and reconciles
# disappearances for its own areas (per-area, not all-or-nothing) so withdrawals
# are caught same-day. Cron is UTC; 11:00 UTC ≈ 13:00 Europe/Stockholm (summer).
name: Scrape batch 1

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Warm up FlipHaus server
        continue-on-error: true
        run: |
          curl -sS --max-time 60 --retry 6 --retry-all-errors --retry-delay 10 \
            "$FLIPHAUS_REFRESH_URL/api/scrape-health" \
            -o /dev/null -w "warmup HTTP %{http_code} in %{time_total}s\n"
        env:
          FLIPHAUS_REFRESH_URL: ${{ secrets.FLIPHAUS_REFRESH_URL }}

      - name: Scrape batch 1 active listings
        run: |
          curl --fail-with-body -sS --max-time 300 --retry 2 --retry-all-errors --retry-delay 20 \
            -H "x-refresh-token: $FLIPHAUS_REFRESH_TOKEN" \
            "$FLIPHAUS_REFRESH_URL/api/scrape?includeDetails=false&batch=1"
        env:
          FLIPHAUS_REFRESH_URL: ${{ secrets.FLIPHAUS_REFRESH_URL }}
          FLIPHAUS_REFRESH_TOKEN: ${{ secrets.FLIPHAUS_REFRESH_TOKEN }}
