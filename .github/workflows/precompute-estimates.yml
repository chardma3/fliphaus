# Manually recompute + store every active listing's resale estimate WITHOUT
# running the full scrape. Use it right after deploying the precompute change (to
# populate the store immediately instead of waiting for the nightly refresh), or
# any time you want to verify the store is fresh. The daily refresh-fliphaus.yml
# already runs this step at the end of each scrape, so there's no cron here.
name: Precompute resale estimates
on:
  workflow_dispatch:

jobs:
  precompute:
    runs-on: ubuntu-latest
    steps:
      - name: Precompute resale estimates
        run: |
          curl --fail-with-body -sS --max-time 300 --retry 2 --retry-delay 20 \
            -H "x-refresh-token: $FLIPHAUS_REFRESH_TOKEN" \
            "$FLIPHAUS_REFRESH_URL/api/precompute-estimates"
        env:
          FLIPHAUS_REFRESH_URL: ${{ secrets.FLIPHAUS_REFRESH_URL }}
          FLIPHAUS_REFRESH_TOKEN: ${{ secrets.FLIPHAUS_REFRESH_TOKEN }}
