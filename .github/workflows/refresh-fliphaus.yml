# Daily sold-comparables refresh + reconciliation + image analysis + precompute.
#
# This job used to hold a runner open ~2.5h EVERY weekday, curl-waiting on Render
# while it scraped slutpriser area-by-area (22 requests, each up to 600s). On a
# private repo that's ~3,300 Actions min/month — over the 2,000-min free budget,
# which is why Actions kept running out.
#
# It now just TRIGGERS the work and exits (~1 min). /api/refresh-sold-all acquires
# the job lock, returns 202 immediately, and runs the whole chain in the BACKGROUND
# on Render (one browser over all areas, one reconcile, then analyse + precompute).
# Progress/results show up in /api/scrape-health via per-stage scrapeRun rows.
#
# Runs AFTER the three scrape batches (13:00 UTC ≈ 15:00 Europe/Stockholm, summer)
# so reconcile matches freshly-disappeared listings against the latest slutpriser.
# Mon–Fri only (day-of-week 1-5): weekends add no new listings/sales.
name: Refresh FlipHaus sold data

on:
  schedule:
    - cron: "0 13 * * 1-5"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Warm up FlipHaus server
        # Wake a sleeping Render instance before triggering. /api/scrape-health is
        # public and lightweight (two DB reads, no Puppeteer). Never fails the run.
        continue-on-error: true
        run: |
          curl -sS --max-time 60 --retry 6 --retry-all-errors --retry-delay 10 \
            "$FLIPHAUS_REFRESH_URL/api/scrape-health" \
            -o /dev/null -w "warmup HTTP %{http_code} in %{time_total}s\n"
        env:
          FLIPHAUS_REFRESH_URL: ${{ secrets.FLIPHAUS_REFRESH_URL }}

      - name: Trigger background sold refresh (returns immediately)
        # POST returns 202 in seconds; the heavy scrape/reconcile/precompute runs
        # on Render. --retry (not --retry-all-errors) so we retry only transient
        # connection failures, NOT a 409 "already running". continue-on-error so a
        # 409 (a run already in flight) never red-Xes the workflow.
        continue-on-error: true
        run: |
          curl --fail-with-body -sS --max-time 60 --retry 3 --retry-delay 15 \
            -X POST -H "x-refresh-token: $FLIPHAUS_REFRESH_TOKEN" \
            "$FLIPHAUS_REFRESH_URL/api/refresh-sold-all" \
            || echo "  ✗ refresh trigger returned busy/failed (background job may already be running)"
        env:
          FLIPHAUS_REFRESH_URL: ${{ secrets.FLIPHAUS_REFRESH_URL }}
          FLIPHAUS_REFRESH_TOKEN: ${{ secrets.FLIPHAUS_REFRESH_TOKEN }}
