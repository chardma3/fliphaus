name: Refresh FlipHaus data

on:
  schedule:
    - cron: "20 5 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh active dashboard listings
        run: |
          curl --fail-with-body -sS --max-time 300 --retry 2 --retry-all-errors --retry-delay 20 -H "x-refresh-token: $FLIPHAUS_REFRESH_TOKEN" "$FLIPHAUS_REFRESH_URL/api/scrape?includeDetails=false"
        env:
          FLIPHAUS_REFRESH_URL: ${{ secrets.FLIPHAUS_REFRESH_URL }}
          FLIPHAUS_REFRESH_TOKEN: ${{ secrets.FLIPHAUS_REFRESH_TOKEN }}

      - name: Refresh Rissne sold comparable properties
        run: |
          curl --fail-with-body -sS --max-time 300 --retry 2 --retry-all-errors --retry-delay 20 -H "x-refresh-token: $FLIPHAUS_REFRESH_TOKEN" "$FLIPHAUS_REFRESH_URL/api/scrape-sold?area=Rissne&detailLimit=5&includeDetails=false&includeAnalysis=false"
        env:
          FLIPHAUS_REFRESH_URL: ${{ secrets.FLIPHAUS_REFRESH_URL }}
          FLIPHAUS_REFRESH_TOKEN: ${{ secrets.FLIPHAUS_REFRESH_TOKEN }}

      - name: Refresh Farsta sold comparable properties
        run: |
          curl --fail-with-body -sS --max-time 300 --retry 2 --retry-all-errors --retry-delay 20 -H "x-refresh-token: $FLIPHAUS_REFRESH_TOKEN" "$FLIPHAUS_REFRESH_URL/api/scrape-sold?area=Farsta&detailLimit=5&includeDetails=false&includeAnalysis=false"
        env:
          FLIPHAUS_REFRESH_URL: ${{ secrets.FLIPHAUS_REFRESH_URL }}
          FLIPHAUS_REFRESH_TOKEN: ${{ secrets.FLIPHAUS_REFRESH_TOKEN }}

      - name: Analyse scraped listing images
        continue-on-error: true
        run: |
          curl --fail-with-body -sS --max-time 300 --retry 1 --retry-all-errors --retry-delay 20 -H "x-refresh-token: $FLIPHAUS_REFRESH_TOKEN" "$FLIPHAUS_REFRESH_URL/api/analyze-images?dataset=all&limit=10"
        env:
          FLIPHAUS_REFRESH_URL: ${{ secrets.FLIPHAUS_REFRESH_URL }}
          FLIPHAUS_REFRESH_TOKEN: ${{ secrets.FLIPHAUS_REFRESH_TOKEN }}

      - name: Confirm sold FlipHaus dashboard listings
        run: |
          curl --fail-with-body -sS -H "x-refresh-token: $FLIPHAUS_REFRESH_TOKEN" "$FLIPHAUS_REFRESH_URL/api/reconcile-sold"
        env:
          FLIPHAUS_REFRESH_URL: ${{ secrets.FLIPHAUS_REFRESH_URL }}
          FLIPHAUS_REFRESH_TOKEN: ${{ secrets.FLIPHAUS_REFRESH_TOKEN }}
