# Daily sold-comparables refresh + sold reconciliation + image analysis / self-heal.
# The active listing scrape moved to the staggered scrape-batch-{1,2,3} workflows
# (each reconciles its own areas' disappearances). This runs AFTER all three
# batches so reconcile-sold matches freshly-disappeared listings against the
# latest slutpriser. Cron is UTC; 13:00 UTC ≈ 15:00 Europe/Stockholm (summer) —
# 40 min after batch 3 so its scrape has finished and freed the job lock.
# Mon–Fri only (day-of-week 1-5): weekends add no new listings/sales, and this is
# the long (~1–2h) job — no reason to run it Sat/Sun. See scrape-batch-1.yml.
name: Refresh FlipHaus sold data

on:
  schedule:
    - cron: "0 13 * * 1-5"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Warm up FlipHaus server
        # Wake a sleeping Render instance before the heavy scrape so the first
        # request doesn't hit a cold start. /api/scrape-health is public and
        # lightweight (two DB reads, no Puppeteer). Never fails the run.
        continue-on-error: true
        run: |
          curl -sS --max-time 60 --retry 6 --retry-all-errors --retry-delay 10 \
            "$FLIPHAUS_REFRESH_URL/api/scrape-health" \
            -o /dev/null -w "warmup HTTP %{http_code} in %{time_total}s\n"
        env:
          FLIPHAUS_REFRESH_URL: ${{ secrets.FLIPHAUS_REFRESH_URL }}

      - name: Refresh Farsta sold comparable properties
        # Farsta is the home area with the deepest sold history, so this walks the
        # most pages and is the slowest single request — give it a generous ceiling
        # (600s). Do NOT use --retry-all-errors: on a max-time timeout it would
        # re-fire the whole heavy scrape while the server is usually still writing
        # the data. continue-on-error + || echo so a slow finish never aborts the
        # expansion-area scrape, image analysis, or reconcile-sold below (which
        # matches whatever Farsta managed to write).
        continue-on-error: true
        run: |
          curl --fail-with-body -sS --max-time 600 --retry 2 --retry-delay 20 \
            -H "x-refresh-token: $FLIPHAUS_REFRESH_TOKEN" \
            "$FLIPHAUS_REFRESH_URL/api/scrape-sold?area=Farsta&detailLimit=5&includeDetails=false&includeAnalysis=false" \
            || echo "  ✗ Farsta sold scrape failed/timed out (server usually still wrote the data; reconcile-sold will pick it up)"
        env:
          FLIPHAUS_REFRESH_URL: ${{ secrets.FLIPHAUS_REFRESH_URL }}
          FLIPHAUS_REFRESH_TOKEN: ${{ secrets.FLIPHAUS_REFRESH_TOKEN }}

      - name: Refresh expansion-area sold comparable properties
        # Every area in LOCATION_IDS beyond Farsta. Looped (not one step each) to
        # keep the workflow compact; --data-urlencode encodes the non-ASCII names
        # (Skarpnäck, Årsta, Östermalm, …) and the spaces in "Stora Mossen" /
        # "Lilla Essingen" / "Stora Essingen" (quoted so the for-loop keeps each
        # one token). A blocked area is logged and skipped so one failure doesn't
        # drop the others. (Gärdet retired 2026-06-24 — now covered by Östermalm.)
        continue-on-error: true
        run: |
          for area in Kista Bagarmossen Skarpnäck Johanneshov Bromma Alvik "Stora Mossen" Enskede Solna Årsta Hägersten Hökarängen Kärrtorp Högdalen "Lilla Essingen" "Stora Essingen" "Östermalm" "Södermalm" Finntorp Ektorp Sickla; do
            echo "→ sold scrape: $area"
            curl --fail-with-body -sS -G --max-time 600 --retry 2 --retry-delay 20 \
              -H "x-refresh-token: $FLIPHAUS_REFRESH_TOKEN" \
              --data-urlencode "area=$area" \
              --data-urlencode "detailLimit=5" \
              --data-urlencode "includeDetails=false" \
              --data-urlencode "includeAnalysis=false" \
              "$FLIPHAUS_REFRESH_URL/api/scrape-sold" \
              || echo "  ✗ $area sold scrape failed (continuing)"
          done
        env:
          FLIPHAUS_REFRESH_URL: ${{ secrets.FLIPHAUS_REFRESH_URL }}
          FLIPHAUS_REFRESH_TOKEN: ${{ secrets.FLIPHAUS_REFRESH_TOKEN }}

      - name: Analyse scraped listing images
        # Scores new listings AND runs self-heal (re-hydrates the bot-block tail).
        continue-on-error: true
        run: |
          curl --fail-with-body -sS --max-time 300 --retry 1 --retry-all-errors --retry-delay 20 -H "x-refresh-token: $FLIPHAUS_REFRESH_TOKEN" "$FLIPHAUS_REFRESH_URL/api/analyze-images?dataset=all&limit=10"
        env:
          FLIPHAUS_REFRESH_URL: ${{ secrets.FLIPHAUS_REFRESH_URL }}
          FLIPHAUS_REFRESH_TOKEN: ${{ secrets.FLIPHAUS_REFRESH_TOKEN }}

      - name: Confirm sold FlipHaus dashboard listings
        run: |
          curl --fail-with-body -sS -H "x-refresh-token: $FLIPHAUS_REFRESH_TOKEN" "$FLIPHAUS_REFRESH_URL/api/reconcile-sold"
        env:
          FLIPHAUS_REFRESH_URL: ${{ secrets.FLIPHAUS_REFRESH_URL }}
          FLIPHAUS_REFRESH_TOKEN: ${{ secrets.FLIPHAUS_REFRESH_TOKEN }}
