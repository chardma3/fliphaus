# Prune sold comparables older than the retention window, to keep the collection
# bounded. Destructive, so it DEFAULTS TO A DRY RUN: run it once with dryRun=true
# to see how many rows would be deleted (and review scripts/diagnose-sold-
# collection.js), then run again with dryRun=false to actually delete. No cron —
# this is a deliberate, operator-triggered action.
name: Prune old sold comps
on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: "Dry run (count only, delete nothing)"
        type: boolean
        default: true
      months:
        description: "Retention window in months (blank = SOLD_RETENTION_MONTHS default 15)"
        required: false
        default: ""

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - name: Prune old sold comps
        run: |
          curl --fail-with-body -sS -G --max-time 120 --retry 2 --retry-delay 20 \
            -H "x-refresh-token: $FLIPHAUS_REFRESH_TOKEN" \
            --data-urlencode "dryRun=${{ inputs.dryRun }}" \
            --data-urlencode "months=${{ inputs.months }}" \
            "$FLIPHAUS_REFRESH_URL/api/prune-sold"
        env:
          FLIPHAUS_REFRESH_URL: ${{ secrets.FLIPHAUS_REFRESH_URL }}
          FLIPHAUS_REFRESH_TOKEN: ${{ secrets.FLIPHAUS_REFRESH_TOKEN }}
