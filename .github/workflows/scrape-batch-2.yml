# Staggered active scrape — batch 2 of 3. See scrape-batch-1.yml for rationale.
# 11:40 UTC ≈ 13:40 Europe/Stockholm (summer); 40 min after batch 1 — wide enough
# that batch 1's scrape (up to 6 proxy retries/area) fully finishes and releases
# the single-instance job lock before this fires, so the two never 409-collide.
# Mon–Fri only (day-of-week 1-5) — no new weekend listings; see scrape-batch-1.yml.
name: Scrape batch 2

on:
  schedule:
    - cron: "40 11 * * 1-5"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Warm up FlipHaus server
        continue-on-error: true
        run: |
          curl -sS --max-time 60 --retry 6 --retry-all-errors --retry-delay 10 \
            "$FLIPHAUS_REFRESH_URL/api/scrape-health" \
            -o /dev/null -w "warmup HTTP %{http_code} in %{time_total}s\n"
        env:
          FLIPHAUS_REFRESH_URL: ${{ secrets.FLIPHAUS_REFRESH_URL }}

      - name: Scrape batch 2 active listings
        run: |
          curl --fail-with-body -sS --max-time 300 --retry 2 --retry-all-errors --retry-delay 20 \
            -H "x-refresh-token: $FLIPHAUS_REFRESH_TOKEN" \
            "$FLIPHAUS_REFRESH_URL/api/scrape?includeDetails=false&batch=2"
        env:
          FLIPHAUS_REFRESH_URL: ${{ secrets.FLIPHAUS_REFRESH_URL }}
          FLIPHAUS_REFRESH_TOKEN: ${{ secrets.FLIPHAUS_REFRESH_TOKEN }}
