<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlipHaus · Friends view</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121212; color: #e0e0e0; }
    a { color: inherit; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; padding: 8px 0 16px; }
    /* Heading links back to the default (Deals) view — headings are clickable app-wide. */
    .brand { text-decoration: none; }
    .brand h1 { color: #fff; font-size: 1.4rem; }
    .brand .tag { color: #69db7c; font-size: 0.78rem; letter-spacing: 0.5px; text-transform: uppercase; }
    #header-right { display: flex; align-items: center; gap: 14px; font-size: 0.85rem; }
    #header-right img { width: 26px; height: 26px; border-radius: 50%; }
    .signout-link { color: #888; text-decoration: none; }
    .signout-link:hover { color: #ccc; }
    .fx-note { color: #666; font-size: 0.75rem; }
    .top-nav { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #2a2a2a; }
    .top-nav a { color: #888; text-decoration: none; font-size: 0.82rem; padding: 6px 12px; border-radius: 8px; }
    .top-nav a:hover { color: #ccc; background: #1e1e1e; }
    .top-nav a.active { color: #fff; background: #242424; }
    #view-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .view-tab { background: #1e1e1e; border: 1px solid #333; color: #bbb; border-radius: 999px; padding: 7px 16px; cursor: pointer; font-size: 0.85rem; }
    .view-tab.active { background: #69db7c; border-color: #69db7c; color: #06210f; font-weight: 600; }
    #stats { color: #999; font-size: 0.85rem; margin-bottom: 12px; }
    #feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 18px; }
    .card { background: #1b1b1b; border: 1px solid #2a2a2a; border-radius: 14px; overflow: hidden; display: flex; flex-direction: column; }
    .card .photo { width: 100%; aspect-ratio: 4/3; object-fit: cover; background: #222; display: block; }
    .card .no-photo { width: 100%; aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; color: #555; background: #222; font-size: 0.8rem; }
    .card .body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 6px; }
    .card h3 { color: #fff; font-size: 1rem; }
    .card .loc { color: #999; font-size: 0.82rem; }
    .price { color: #fff; font-size: 1.15rem; font-weight: 700; margin-top: 4px; }
    .price .aud { display: block; color: #69db7c; font-size: 0.85rem; font-weight: 600; }
    .meta { color: #aaa; font-size: 0.8rem; display: flex; flex-wrap: wrap; gap: 8px; margin-top: 2px; }
    .reno-badge { display: inline-block; align-self: flex-start; margin-top: 6px; font-size: 0.72rem; padding: 3px 9px; border-radius: 999px; font-weight: 600; }
    .reno-badge.high { background: #3a2a12; color: #ffca7a; }
    .reno-badge.medium { background: #123a2a; color: #7ae0b0; }
    .reno-badge.low { background: #1a2233; color: #9ec5ff; }
    .resale { margin-top: 8px; padding-top: 8px; border-top: 1px solid #262626; font-size: 0.8rem; color: #bbb; }
    .resale .aud { color: #69db7c; }
    .days { color: #ffb347; font-size: 0.78rem; }
    .feed-loading { grid-column: 1/-1; display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 60px 20px; color: #888; }
    .feed-spinner { width: 34px; height: 34px; border-radius: 50%; border: 3px solid #333; border-top-color: #69db7c; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .feed-error { grid-column: 1/-1; text-align: center; color: #ff8787; padding: 40px 20px; }
    .feed-error button { margin-top: 12px; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 8px; padding: 8px 16px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a class="brand" href="#" onclick="goHome();return false;">
        <h1>FlipHaus</h1>
      </a>
      <div id="header-right"></div>
    </header>

    <nav class="top-nav">
      <a href="/friends" class="active">Listings</a>
      <a href="/areas">Areas</a>
      <a href="/methodology">How it works</a>
      <a href="/market">Market</a>
      <a href="/glossary">Glossary</a>
    </nav>

    <div id="view-tabs">
      <button class="view-tab active" data-view="deals">Deals</button>
      <button class="view-tab" data-view="moveinready">Move-in ready</button>
      <button class="view-tab" data-view="sitting">On market 14d+</button>
      <button class="view-tab" data-view="newbuild">New builds</button>
    </div>

    <div id="stats"></div>
    <div id="feed"></div>
    <div class="fx-note" id="fx-note" style="margin-top:18px;"></div>
  </div>

  <script>
    let currentView = "deals";
    let fx = null; // { rate, asOf, source }

    const VIEW_LABELS = { deals: "Deals", moveinready: "Move-in ready", sitting: "On market 14d+", newbuild: "New builds" };

    function translateRooms(s) { return s ? s.replace("rum", "rooms") : null; }
    function translateLocation(s) { return s ? s.replace(/s kommun/gi, "").replace(/kommun/gi, "").replace(/,\s*$/, "").trim() : s; }
    function renoClass(score) { return score >= 7 ? "high" : score >= 4 ? "medium" : "low"; }
    function renoLabel(score) { return score >= 7 ? "High potential" : score >= 4 ? "Some potential" : "Move-in ready"; }
    function daysOnMarketOf(l) { return l.publishedAt ? Math.floor((Date.now() - new Date(l.publishedAt).getTime()) / 86400000) : -1; }

    // AUD from a SEK number using the fetched daily rate. Returns "" if no rate/number.
    function audFrom(sek) {
      if (!fx || !fx.rate || !sek) return "";
      return "A$ " + Math.round(sek * fx.rate).toLocaleString("en-AU");
    }

    function goHome() {
      currentView = "deals";
      document.querySelectorAll("#view-tabs .view-tab").forEach((t) => t.classList.toggle("active", t.dataset.view === "deals"));
      loadListings();
    }

    async function loadFx() {
      try {
        const res = await fetch("/api/fx/sek-aud");
        fx = await res.json();
        const when = fx.asOf ? new Date(fx.asOf).toLocaleDateString("en-AU") : "";
        const src = fx.source === "fallback" ? "approx fixed rate" : "daily rate";
        document.getElementById("fx-note").textContent =
          `Australian dollar amounts are indicative, converted at 1 SEK ≈ ${fx.rate.toFixed(4)} AUD (${src}${when ? ", " + when : ""}).`;
      } catch { fx = null; }
    }

    async function loadListings() {
      const statsEl = document.getElementById("stats");
      const feedEl = document.getElementById("feed");
      statsEl.textContent = "Loading…";
      feedEl.innerHTML = `<div class="feed-loading"><div class="feed-spinner"></div><div>Loading listings…</div></div>`;
      let data;
      try {
        const res = await fetch(`/api/listings?view=${currentView}&sort=score-newest`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
      } catch (err) {
        statsEl.textContent = "";
        feedEl.innerHTML = `<div class="feed-error"><div>Couldn't load listings (${err.message}).</div><button onclick="loadListings()">Try again</button></div>`;
        return;
      }
      renderListings(data.listings || []);
    }

    function renderListings(listings) {
      const statsEl = document.getElementById("stats");
      const feedEl = document.getElementById("feed");
      feedEl.innerHTML = "";
      if (!listings.length) { statsEl.textContent = `Nothing shared in ${VIEW_LABELS[currentView]} yet — check back soon.`; return; }
      statsEl.innerHTML = `<strong>${listings.length}</strong> shared ${VIEW_LABELS[currentView]} ${listings.length === 1 ? "property" : "properties"}`;

      for (const l of listings) {
        const imgs = l.images && l.images.length ? l.images : (l.thumbnail ? [l.thumbnail] : []);
        const photo = imgs.length ? `<img class="photo" src="${imgs[0]}" alt="" loading="lazy" />` : `<div class="no-photo">No photo</div>`;
        const aud = audFrom(l.askingPriceNum);
        const days = daysOnMarketOf(l);
        const reno = l.renovationScore != null
          ? `<span class="reno-badge ${renoClass(l.renovationScore)}">${l.renovationScore}/10 — ${renoLabel(l.renovationScore)}</span>` : "";

        // Renovated-resale benchmark from the sold-comp intelligence, if present.
        const arb = l.brfIntelligence?.renovationArbitrage;
        let resale = "";
        if (arb && arb.estimatedRenovatedSqm && l.sizeNum) {
          const resaleSek = Math.round(arb.estimatedRenovatedSqm * l.sizeNum);
          const resaleAud = audFrom(resaleSek);
          resale = `<div class="resale">Renovated resale ≈ ${resaleSek.toLocaleString("sv-SE")} kr${resaleAud ? ` · <span class="aud">${resaleAud}</span>` : ""}<br><span style="color:#888;">${arb.totalComparableSales} sold comps · ${arb.confidence} confidence</span></div>`;
        }

        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          ${photo}
          <div class="body">
            <h3>${l.streetAddress || "—"}</h3>
            <div class="loc">${translateLocation(l.locationDescription) || ""}</div>
            <div class="price">${l.askingPrice || "—"}${aud ? `<span class="aud">${aud}</span>` : ""}</div>
            <div class="meta">
              ${l.rooms ? `<span>${translateRooms(l.rooms)}</span>` : ""}
              ${l.size ? `<span>${l.size}</span>` : ""}
              ${days >= 0 ? `<span class="days">${days} days on market</span>` : ""}
            </div>
            ${reno}
            ${resale}
          </div>`;
        feedEl.appendChild(div);
      }
    }

    document.querySelectorAll("#view-tabs .view-tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        if (tab.dataset.view === currentView) return;
        currentView = tab.dataset.view;
        document.querySelectorAll("#view-tabs .view-tab").forEach((t) => t.classList.toggle("active", t === tab));
        loadListings();
      });
    });

    async function init() {
      const me = await (await fetch("/api/me")).json();
      const user = me.user;
      // Friends view is for the 'friend' role; admin can also view it. Everyone
      // else is sent to their proper destination.
      if (!user) { window.location.replace("/login"); return; }
      if (user.role !== "friend" && user.role !== "admin") { window.location.replace("/invest"); return; }

      document.getElementById("header-right").innerHTML = `
        <span>${(user.name || "").split(" ")[0]}</span>
        ${user.avatar ? `<img src="${user.avatar}" alt="" />` : ""}
        <a href="/auth/logout" class="signout-link">Sign out</a>`;

      await loadFx();
      loadListings();
    }

    init();
  </script>
</body>
</html>
