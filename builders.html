<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Builders — FlipHaus</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: "Poppins", sans-serif; background: #121212; color: #e0e0e0; min-height: 100vh; }
      #app { display: flex; flex-direction: column; align-items: center; padding: 24px 16px; }

      header { width: 100%; max-width: 700px; display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
      header h1 { font-size: 1.8rem; color: #fff; }
      header h2 { font-size: 0.85rem; font-weight: 300; color: #666; margin-top: 2px; }
      .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
      .header-right img { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; }
      .header-right span { font-size: 0.85rem; color: #aaa; }
      .signout-link { font-size: 0.8rem; color: #555; text-decoration: none; }

      .nav-menu { width:100%;max-width:700px;display:flex;justify-content:center;margin-bottom:16px;background:#1a1a1a;border:1px solid #2a2a2a; }
      .nav-item { font-family:"Poppins",sans-serif;font-size:0.78rem;color:#666;text-decoration:none;padding:10px 12px;border-right:1px solid #2a2a2a;transition:all 0.2s; }
      .nav-item:last-child { border-right:none; }
      .nav-item:hover { color:#ccc;background:#222; }
      .nav-item.active { color:#fff;background:#2a2a2a; }

      .content { width: 100%; max-width: 700px; }
      .section { background: #1e1e1e; border-radius: 10px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
      .section h3 { font-size: 1.1rem; color: #fff; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #2a2a2a; }

      .form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
      .form-row input { flex: 1; min-width: 120px; padding: 8px 12px; background: #252525; border: 1px solid #333; border-radius: 6px; color: #e0e0e0; font-family: "Poppins", sans-serif; font-size: 0.85rem; outline: none; }
      .form-row input:focus { border-color: #69db7c; }
      .form-row input::placeholder { color: #555; }

      .btn { padding: 8px 16px; border: none; border-radius: 6px; font-family: "Poppins", sans-serif; font-size: 0.82rem; cursor: pointer; transition: opacity 0.2s; }
      .btn:hover { opacity: 0.85; }
      .btn-primary { background: #1a3a1a; color: #69db7c; }
      .btn-danger { background: #3a1a1a; color: #ff8888; font-size: 0.75rem; padding: 4px 10px; }
      .btn-small { font-size: 0.75rem; padding: 4px 10px; }
      .btn-blue { background: #1a2a3a; color: #7eb8f7; }

      .builder-card { background: #252525; border-radius: 8px; padding: 14px; margin-bottom: 10px; }
      .builder-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
      .builder-header h4 { font-size: 0.95rem; color: #fff; }
      .builder-meta { font-size: 0.78rem; color: #888; }
      .builder-actions { display: flex; gap: 8px; margin-top: 8px; align-items: center; }

      .invite-link { font-size: 0.75rem; color: #69db7c; background: #1a2a1a; padding: 6px 10px; border-radius: 4px; word-break: break-all; margin-top: 8px; display: none; }

      .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a3a1a; color: #69db7c; padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
      .toast.visible { opacity: 1; }

      .empty { text-align: center; padding: 30px; color: #555; font-size: 0.88rem; }

      /* Assignment section */
      .assign-section { margin-top: 16px; }
      .assignment-card { background: #252525; border-radius: 8px; padding: 14px; margin-bottom: 10px; border-left: 3px solid #333; }
      .assignment-card.pending { border-left-color: #ffd43b; }
      .assignment-card.proposed { border-left-color: #7eb8f7; }
      .assignment-card.accepted { border-left-color: #69db7c; }
      .assignment-card.declined { border-left-color: #ff8888; }
      .assignment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
      .assignment-header h4 { font-size: 0.9rem; color: #fff; }
      .status-tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; }
      .status-tag.pending { background: #2a2a1a; color: #ffd43b; }
      .status-tag.proposed { background: #1a2a3a; color: #7eb8f7; }
      .status-tag.accepted { background: #1a2a1a; color: #69db7c; }
      .status-tag.declined { background: #2a1a1a; color: #ff8888; }
      .proposal-detail { font-size: 0.78rem; color: #aaa; margin-top: 4px; }
      .proposal-detail span { color: #ccc; }
    </style>
  </head>
  <body>
    <div class="toast" id="toast"></div>
    <div id="app">
      <header>
        <div><a href="/" style="text-decoration:none;color:inherit;"><h1>FlipHaus</h1></a><h2>Builder management</h2></div>
        <div class="header-right" id="header-right"></div>
      </header>
      <div class="nav-menu">
        <a href="/" class="nav-item">Listings</a>
        <a href="/favorites" class="nav-item">Favorites</a>
        <a href="/areas" class="nav-item">Areas</a>
        <a href="/methodology" class="nav-item">How it works</a>
        <a href="/market" class="nav-item">Market</a>
        <a href="/builders" class="nav-item active">Builders</a>
        <a href="/sold" class="nav-item">Sold</a>
        <a href="/glossary" class="nav-item">Glossary</a>
      </div>
      <div class="content">
        <div class="section">
          <h3>Invite a builder</h3>
          <div class="form-row">
            <input type="text" id="b-name" placeholder="Name" />
            <input type="email" id="b-email" placeholder="Email" />
          </div>
          <div class="form-row">
            <input type="text" id="b-company" placeholder="Company (optional)" />
            <input type="text" id="b-phone" placeholder="Phone (optional)" />
          </div>
          <button class="btn btn-primary" id="invite-btn">Invite builder</button>
          <div class="invite-link" id="invite-link-box"></div>
        </div>
        <div class="section">
          <h3>Partner builders</h3>
          <div id="builder-list"><div class="empty">Loading...</div></div>
        </div>
        <div class="section">
          <h3>Assignments & proposals</h3>
          <div id="assignment-list"><div class="empty">Loading...</div></div>
        </div>
      </div>
    </div>
    <script>
      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg; t.classList.add("visible");
        setTimeout(() => t.classList.remove("visible"), 2000);
      }

      async function loadBuilders() {
        const res = await fetch("/api/admin/builders");
        const data = await res.json();
        const el = document.getElementById("builder-list");
        if (!data.builders?.length) { el.innerHTML = '<div class="empty">No builders invited yet.</div>'; return; }

        el.innerHTML = data.builders.map(b => `
          <div class="builder-card" data-id="${b._id}">
            <div class="builder-header">
              <h4>${b.name}</h4>
              <button class="btn btn-danger remove-builder" data-id="${b._id}">Remove</button>
            </div>
            <div class="builder-meta">${b.email}${b.company ? ' · ' + b.company : ''}${b.phone ? ' · ' + b.phone : ''}</div>
            <div class="builder-meta">${b.lastLoginAt ? 'Last login: ' + new Date(b.lastLoginAt).toLocaleDateString() : 'Has not logged in yet'}</div>
          </div>
        `).join("");

        el.querySelectorAll(".remove-builder").forEach(btn => {
          btn.addEventListener("click", async () => {
            if (!confirm("Remove this builder and all their assignments?")) return;
            await fetch("/api/admin/builders/" + btn.dataset.id, { method: "DELETE" });
            showToast("Builder removed");
            loadBuilders();
            loadAssignments();
          });
        });
      }

      async function loadAssignments() {
        const res = await fetch("/api/admin/assignments");
        const data = await res.json();
        const el = document.getElementById("assignment-list");
        if (!data.assignments?.length) { el.innerHTML = '<div class="empty">No assignments yet. Send listings to builders from the main feed.</div>'; return; }

        el.innerHTML = data.assignments.map(a => {
          const l = a.listing;
          const p = a.proposal;
          const b = a.builderId;
          return `
            <div class="assignment-card ${a.status}">
              <div class="assignment-header">
                <h4>${l ? l.streetAddress : 'Unknown listing'}</h4>
                <span class="status-tag ${a.status}">${a.status}</span>
              </div>
              <div class="proposal-detail">Builder: <span>${b?.name || 'Unknown'}</span> · ${b?.company || ''}</div>
              ${l ? `<div class="proposal-detail">${l.locationDescription} · ${l.askingPrice}</div>` : ''}
              ${p ? `
                <div class="proposal-detail" style="margin-top:8px;">
                  Cost: <span>${p.estimatedCostSEK?.toLocaleString('sv-SE')} SEK</span> ·
                  Timeline: <span>${p.timelineWeeks} weeks + ${p.bufferWeeks}w buffer</span> ·
                  Start: <span>${new Date(p.startDate).toLocaleDateString()}</span>
                </div>
                ${p.costBreakdown ? `<div class="proposal-detail">Breakdown: <span>${p.costBreakdown}</span></div>` : ''}
                ${p.notes ? `<div class="proposal-detail">Notes: <span>${p.notes}</span></div>` : ''}
              ` : ''}
              ${a.status === 'proposed' ? `
                <div style="display:flex;gap:8px;margin-top:10px;">
                  <button class="btn btn-primary btn-small accept-btn" data-id="${a._id}">Accept</button>
                  <button class="btn btn-danger decline-btn" data-id="${a._id}">Decline</button>
                </div>
              ` : ''}
            </div>
          `;
        }).join("");

        el.querySelectorAll(".accept-btn").forEach(btn => {
          btn.addEventListener("click", async () => {
            await fetch("/api/admin/assignments/" + btn.dataset.id, { method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify({status:"accepted"}) });
            showToast("Proposal accepted");
            loadAssignments();
          });
        });
        el.querySelectorAll(".decline-btn").forEach(btn => {
          btn.addEventListener("click", async () => {
            await fetch("/api/admin/assignments/" + btn.dataset.id, { method: "PATCH", headers: {"Content-Type":"application/json"}, body: JSON.stringify({status:"declined"}) });
            showToast("Proposal declined");
            loadAssignments();
          });
        });
      }

      document.getElementById("invite-btn").addEventListener("click", async () => {
        const name = document.getElementById("b-name").value.trim();
        const email = document.getElementById("b-email").value.trim();
        const company = document.getElementById("b-company").value.trim();
        const phone = document.getElementById("b-phone").value.trim();
        if (!name || !email) return showToast("Name and email required");

        const res = await fetch("/api/admin/builders", {
          method: "POST", headers: {"Content-Type":"application/json"},
          body: JSON.stringify({ name, email, company, phone }),
        });
        const data = await res.json();
        if (!res.ok) return showToast(data.error);

        const linkBox = document.getElementById("invite-link-box");
        linkBox.style.display = "block";
        linkBox.textContent = data.inviteLink;
        navigator.clipboard.writeText(data.inviteLink).then(() => showToast("Invite link copied!"));

        document.getElementById("b-name").value = "";
        document.getElementById("b-email").value = "";
        document.getElementById("b-company").value = "";
        document.getElementById("b-phone").value = "";
        loadBuilders();
      });

      async function init() {
        const res = await fetch("/api/me");
        const data = await res.json();
        const headerRight = document.getElementById("header-right");
        if (data.user) {
          headerRight.innerHTML = `<a href="/account" style="display:flex;align-items:center;gap:8px;text-decoration:none;"><img src="${data.user.avatar}" alt="" /><span>${data.user.name.split(" ")[0]}</span></a><a href="/auth/logout" class="signout-link">Sign out</a>`;
          loadBuilders();
          loadAssignments();
        } else {
          document.getElementById("content")?.remove();
          headerRight.innerHTML = '<a href="/auth/google" style="padding:6px 14px;border-radius:6px;background:#fff;color:#333;font-size:0.82rem;text-decoration:none;">Sign in</a>';
        }
      }
      init();
    </script>
  </body>
</html>
